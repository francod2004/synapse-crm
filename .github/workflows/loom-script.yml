name: Unify Loom Script Poller (v6)

# Polls agent_queue every 30 minutes for entries flipped to
# status='loom_requested' and drafts a 3-bullet Loom recording script
# back into the entry's payload. Franco gets an SMS when a script is
# ready to record.

on:
  schedule:
    # Every 30 minutes (runs on :07 and :37 to stay off the :00/:30 fleet
    # peaks; the GitHub Actions scheduler applies its own deterministic jitter
    # on top of this).
    - cron: '7,37 * * * *'
  workflow_dispatch:

jobs:
  loom-script:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Draft Loom scripts for loom_requested entries
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          FRANCO_PHONE: ${{ secrets.FRANCO_PHONE }}
        run: python cold_email_agent.py --loom-script
