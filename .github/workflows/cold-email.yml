name: Unify Cold Email Agent

on:
  schedule:
    - cron: '0 12,15,18,21 * * *'  # Runs at 8 AM, 11 AM, 2 PM, 5 PM EDT
  workflow_dispatch:
    inputs:
      mode:
        description: 'Agent mode'
        required: true
        default: 'draft'
        type: choice
        options:
          - draft
          - send
      max:
        description: 'Max prospects to process (use 500 to sweep all existing)'
        required: false
        default: '20'

jobs:
  cold-email:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 lxml google-auth google-auth-oauthlib google-api-python-client

      - name: Run Cold Email Agent
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          TWILIO_SID: ${{ secrets.TWILIO_SID }}
          TWILIO_TOKEN: ${{ secrets.TWILIO_TOKEN }}
          TWILIO_FROM: ${{ secrets.TWILIO_FROM }}
          FRANCO_PHONE: ${{ secrets.FRANCO_PHONE }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: python cold_email_agent.py --${{ github.event.inputs.mode || 'draft' }} --max ${{ github.event.inputs.max || '20' }}
